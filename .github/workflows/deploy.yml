name: Lead pipeline
run-name: >-
  ${{ github.event_name == 'schedule' && format('Daily scrape (10 max) in {0}', vars.DAILY_CITY || 'dallas') || (inputs.deploy_pending_only && 'Deploy pending leads' || (inputs.scrape_mode == 'all_niches' && format('Parallel scrape ({0} max) in {1}', inputs.max_results, inputs.city) || format('Scrape + deploy {0} in {1}', inputs.niche, inputs.city))) }}

on:
  schedule:
    # Daily batch — 10 sites (9:00 AM US Central ≈ 14:00 UTC)
    - cron: "0 14 * * *"
  workflow_dispatch:
    inputs:
      scrape_mode:
        description: Scrape all niches in parallel, or one niche only
        type: choice
        required: true
        default: all_niches
        options:
          - all_niches
          - single
      niche:
        description: Niche (only when scrape_mode = single)
        type: choice
        required: true
        default: plumber
        options:
          - plumber
          - electrician
          - hvac
          - carpenter
          - mechanic
          - roofer
          - landscaper
          - painter
          - locksmith
          - house_cleaning
          - pest_control
          - garage_door
          - fence
          - concrete
          - handyman
          - towing
          - tree_service
          - appliance_repair
          - pool_service
          - pressure_washing
      city:
        description: Target city
        type: choice
        required: true
        default: dallas
        options:
          - dallas
          - fort_worth
          - arlington
          - plano
          - frisco
          - irving
          - garland
          - mckinney
          - denton
          - richardson
          - austin
          - houston
          - san_antonio
          - oklahoma_city
          - tulsa
      max_results:
        description: Max qualified leads to collect (all_niches) or scrape (single)
        required: true
        default: "50"
      deploy_pending_only:
        description: Skip scrape — deploy sites for sheet rows missing live URL
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: lead-pipeline
  cancel-in-progress: false

jobs:
  scrape-all:
    if: ${{ github.event_name == 'schedule' || (!inputs.deploy_pending_only && inputs.scrape_mode == 'all_niches') }}
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright/python:v1.49.1-jammy
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: pip install gspread google-auth python-dotenv jinja2 'playwright==1.49.1'

      - name: Scrape all niches (one browser, parallel contexts)
        run: python scripts/scrape_all_niches.py
        env:
          CITY_ID: ${{ github.event_name == 'schedule' && (vars.DAILY_CITY || 'dallas') || inputs.city }}
          MAX_RESULTS: ${{ github.event_name == 'schedule' && '10' || inputs.max_results }}
          NICHE_CONCURRENCY: "5"
          HEADLESS: "true"
          SLOW_MO: "0"
          MAX_CHECK_LISTINGS: "60"
          MAX_REVIEW_SNIPPETS: "8"
          REVIEW_SCRAPE_TIMEOUT_SEC: "12"
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEETS_SPREADSHEET_ID: ${{ vars.GOOGLE_SHEETS_SPREADSHEET_ID }}

      - name: Upload scrape pool
        uses: actions/upload-artifact@v4
        with:
          name: niche-scrapes
          path: data/scrape-pool.json
          if-no-files-found: error
          retention-days: 3

  merge-scrape:
    needs: scrape-all
    if: ${{ github.event_name == 'schedule' || (!inputs.deploy_pending_only && inputs.scrape_mode == 'all_niches') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      lead_indices: ${{ steps.matrix.outputs.lead_indices }}
      lead_count: ${{ steps.matrix.outputs.lead_count }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download niche scrapes
        uses: actions/download-artifact@v4
        with:
          name: niche-scrapes
          path: data

      - name: Merge, dedupe, and upsert to sheet
        run: python scripts/merge_scrape_results.py
        env:
          MAX_RESULTS: ${{ github.event_name == 'schedule' && '10' || inputs.max_results }}
          REQUIRE_LEADS: "true"
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEETS_SPREADSHEET_ID: ${{ vars.GOOGLE_SHEETS_SPREADSHEET_ID }}

      - name: Prepare deploy matrix
        id: matrix
        run: python scripts/write_lead_matrix.py

      - name: Upload leads data
        uses: actions/upload-artifact@v4
        with:
          name: leads-data
          path: data/leads.json
          retention-days: 7

  scrape:
    if: ${{ github.event_name != 'schedule' && !inputs.deploy_pending_only && inputs.scrape_mode == 'single' }}
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright/python:v1.49.1-jammy
    timeout-minutes: 45
    outputs:
      lead_indices: ${{ steps.matrix.outputs.lead_indices }}
      lead_count: ${{ steps.matrix.outputs.lead_count }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: pip install gspread google-auth python-dotenv jinja2 'playwright==1.49.1'

      - name: Resolve search query
        id: search
        run: python scripts/resolve_search.py
        env:
          NICHE_ID: ${{ inputs.niche }}
          CITY_ID: ${{ inputs.city }}

      - name: Scrape Google Maps
        run: python scrap.py
        env:
          SEARCH_QUERY: ${{ steps.search.outputs.search_query }}
          NICHE_ID: ${{ inputs.niche }}
          NICHE_LABEL: ${{ steps.search.outputs.niche_label }}
          MAX_RESULTS: ${{ inputs.max_results }}
          HEADLESS: "true"
          SLOW_MO: "0"
          REQUIRE_LEADS: "true"
          MAX_CHECK_LISTINGS: "100"
          MAX_REVIEW_SNIPPETS: "8"
          REVIEW_SCRAPE_TIMEOUT_SEC: "12"
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEETS_SPREADSHEET_ID: ${{ vars.GOOGLE_SHEETS_SPREADSHEET_ID }}

      - name: Prepare deploy matrix
        id: matrix
        run: python scripts/write_lead_matrix.py

      - name: Upload leads data
        uses: actions/upload-artifact@v4
        with:
          name: leads-data
          path: data/leads.json
          retention-days: 7

  export-pending:
    if: ${{ github.event_name != 'schedule' && inputs.deploy_pending_only }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      lead_indices: ${{ steps.matrix.outputs.lead_indices }}
      lead_count: ${{ steps.matrix.outputs.lead_count }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Export pending leads from sheet
        run: python scripts/export_pending_leads.py
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEETS_SPREADSHEET_ID: ${{ vars.GOOGLE_SHEETS_SPREADSHEET_ID }}

      - name: Prepare deploy matrix
        id: matrix
        run: python scripts/write_lead_matrix.py

      - name: Upload leads data
        uses: actions/upload-artifact@v4
        with:
          name: leads-data
          path: data/leads.json
          retention-days: 7

  deploy-sites:
    needs: [merge-scrape, scrape, export-pending]
    if: |
      always() &&
      !cancelled() &&
      (
        (needs.merge-scrape.result == 'success' && needs.merge-scrape.outputs.lead_count != '0') ||
        (needs.scrape.result == 'success' && needs.scrape.outputs.lead_count != '0') ||
        (needs.export-pending.result == 'success' && needs.export-pending.outputs.lead_count != '0')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        lead_index: ${{ fromJSON(needs.merge-scrape.outputs.lead_indices || needs.scrape.outputs.lead_indices || needs.export-pending.outputs.lead_indices) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download leads data
        uses: actions/download-artifact@v4
        with:
          name: leads-data
          path: data

      - name: Generate site copy with DeepSeek
        run: python scripts/generate_site.py
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEETS_SPREADSHEET_ID: ${{ vars.GOOGLE_SHEETS_SPREADSHEET_ID }}
          LEAD_INDEX: ${{ matrix.lead_index }}

      - name: Deploy site to kem-llc org repo
        id: org_deploy
        run: python scripts/deploy_org_site.py
        env:
          DEPLOY_ORG: ${{ vars.DEPLOY_ORG }}
          ORG_DEPLOY_TOKEN: ${{ secrets.ORG_DEPLOY_TOKEN }}
          LEAD_INDEX: ${{ matrix.lead_index }}

      - name: Update Google Sheet with live URL
        run: python scripts/update_sheet.py
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEETS_SPREADSHEET_ID: ${{ vars.GOOGLE_SHEETS_SPREADSHEET_ID }}
          LIVE_URL: ${{ steps.org_deploy.outputs.live_url }}
          COPY_STATUS: Done
          LEAD_INDEX: ${{ matrix.lead_index }}
