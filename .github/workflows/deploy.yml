name: Lead pipeline
run-name: ${{ format('Scrape + deploy {0} in {1}', inputs.niche, inputs.city) }}

on:
  workflow_dispatch:
    inputs:
      niche:
        description: Small business niche to target
        type: choice
        required: true
        default: plumber
        options:
          - plumber
          - electrician
          - hvac
          - carpenter
          - mechanic
          - roofer
          - landscaper
          - painter
          - locksmith
          - house_cleaning
          - pest_control
          - garage_door
          - fence
          - concrete
          - handyman
          - towing
          - tree_service
          - appliance_repair
          - pool_service
          - pressure_washing
      city:
        description: Target city (DFW first, then expand)
        type: choice
        required: true
        default: dallas
        options:
          - dallas
          - fort_worth
          - arlington
          - plano
          - frisco
          - irving
          - garland
          - mckinney
          - denton
          - richardson
          - austin
          - houston
          - san_antonio
          - oklahoma_city
          - tulsa
      max_results:
        description: Max Google Maps listings to process
        required: true
        default: "5"

permissions:
  contents: read

concurrency:
  group: lead-pipeline
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve search query
        id: search
        run: python scripts/resolve_search.py
        env:
          NICHE_ID: ${{ inputs.niche }}
          CITY_ID: ${{ inputs.city }}

      - name: Install Playwright Chromium
        run: python -m playwright install chromium --with-deps

      - name: Scrape Google Maps
        run: python scrap.py
        env:
          SEARCH_QUERY: ${{ steps.search.outputs.search_query }}
          MAX_RESULTS: ${{ inputs.max_results }}
          HEADLESS: "true"
          SLOW_MO: "0"
          REQUIRE_LEADS: "true"
          MAX_CHECK_LISTINGS: "100"
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEETS_SPREADSHEET_ID: ${{ vars.GOOGLE_SHEETS_SPREADSHEET_ID }}

      - name: Generate site copy with DeepSeek
        run: python scripts/generate_site.py
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEETS_SPREADSHEET_ID: ${{ vars.GOOGLE_SHEETS_SPREADSHEET_ID }}
          LEAD_INDEX: "0"

      - name: Deploy site to kem-llc org repo
        id: org_deploy
        run: python scripts/deploy_org_site.py
        env:
          DEPLOY_ORG: ${{ vars.DEPLOY_ORG }}
          ORG_DEPLOY_TOKEN: ${{ secrets.ORG_DEPLOY_TOKEN }}
          LEAD_INDEX: "0"

      - name: Update Google Sheet with live URL
        run: python scripts/update_sheet.py
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEETS_SPREADSHEET_ID: ${{ vars.GOOGLE_SHEETS_SPREADSHEET_ID }}
          LIVE_URL: ${{ steps.org_deploy.outputs.live_url }}
          COPY_STATUS: Done
