<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading...</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="brand" id="brand">Business</div>
      <a class="header-cta" id="header-cta" href="#">Call Now</a>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container hero-inner">
        <p class="eyebrow" id="tagline">Local experts you can trust</p>
        <h1 id="hero-headline">Professional local service</h1>
        <p class="hero-subtext" id="hero-subtext"></p>
        <div class="hero-actions">
          <a class="btn btn-primary" id="hero-cta" href="#">Call Now</a>
          <div class="rating" id="rating-block" hidden>
            <span class="stars">★★★★★</span>
            <span id="rating-text"></span>
          </div>
        </div>
      </div>
    </section>

    <section class="services section">
      <div class="container">
        <h2>Our Services</h2>
        <div class="services-grid" id="services-grid"></div>
      </div>
    </section>

    <section class="about section section-muted">
      <div class="container about-grid">
        <div>
          <h2 id="about-title">About Us</h2>
          <p id="about-text"></p>
        </div>
        <div class="contact-card">
          <h3>Contact</h3>
          <p id="contact-phone"></p>
          <p id="contact-address"></p>
          <p id="contact-city"></p>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p id="footer-text"></p>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
